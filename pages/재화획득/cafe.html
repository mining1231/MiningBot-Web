<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>카페</title>

    <link rel="stylesheet" href="../../style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<header class="page-header">

    <a href="../../index.html" class="home-btn" aria-label="홈으로 이동">
        <i class="fa-solid fa-house"></i>
    </a>

    <h1>카페</h1>

</header>

<main class="page-content">

    <section class="intro cafe-intro">

        <h2>카페란?</h2>

        <p>
            농사를 통해 수확한 작물로 나만의 카페를 운영해 보세요!
        </p>

        <p>
            <code>/카페</code> 명령어를 통해 재화를 획득할 수 있으며,
            카페 레벨이 높아질수록 성공 확률과 카페 보너스가 증가합니다.
            미닝과 함께 최고의 카페를 운영해 보세요! ☕
        </p>

        <ul>
            <li> 하루 50회 이용 가능</li>
            <li> 쿨타임 10초</li>
        </ul>

    </section>

    <section class="level-buttons">

        <button class="level-btn" data-level="1">Lv.1</button>
        <button class="level-btn" data-level="2">Lv.2</button>
        <button class="level-btn" data-level="3">Lv.3</button>
        <button class="level-btn" data-level="4">Lv.4</button>
        <button class="level-btn" data-level="5">Lv.5</button>
        <button class="level-btn" data-level="6">Lv.6</button>
        <button class="level-btn" data-level="7">Lv.7</button>
        <button class="level-btn" data-level="8">Lv.8</button>
        <button class="level-btn" data-level="9">Lv.9</button>
        <button class="level-btn" data-level="10">Lv.10</button>

    </section>

    <section id="cafeLevelInfo" class="level-card cafe-card">

        <div class="cafe-level-title">
            ☕ Lv.1
        </div>

        <div class="cafe-info-grid">

            <div class="cafe-stat">
                <span>성공 확률</span>
                <strong id="cafeSuccessRate">70%</strong>
            </div>

            <div class="cafe-stat">
                <span>실패 확률</span>
                <strong id="cafeFailRate">30%</strong>
            </div>

            <div class="cafe-stat">
                <span>필요 경험치</span>
                <strong id="cafeExpValue">-</strong>
            </div>

            <div class="cafe-stat">
                <span>카페 보너스</span>
                <strong id="cafeBonusValue">기본</strong>
            </div>

        </div>

    </section>

</main>

<script src="cafe.js"></script>

</body>
</html>
