<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>복권</title>

    <link rel="stylesheet" href="../../style.css">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="page-header">

    <a href="../../index.html"
       class="home-btn"
       aria-label="홈">

        <i class="fa-solid fa-house"></i>

    </a>

    <h1>복권</h1>

</header>

<main class="page-content">

<section class="intro">

    <h2>복권이란?</h2>

    <p>

        <code>/복권</code> 명령어를 통해 미닝봇과 교감해 보세요.

    </p>

    <p>

        양과 늑대 중 하나를 선택하여 정답을 맞히면 보상을 획득할 수 있습니다.
        단, <strong>1분 안에 선택</strong>해야 하며 시간이 지나면 창이 자동으로 닫힙니다.

    </p>

  <div class="lottery-info-grid">

    <div class="farm-stat">

        <span>성공 확률</span>

        <strong>50%</strong>

    </div>

    <div class="farm-stat">

        <span>획득 보상</span>

        <strong>100,000원 ~ 200,000원</strong>

    </div>

</div>

</section>

<section class="level-card">

<div class="lottery-title">

    <i class="fa-solid fa-image"></i>
    실제 사용 화면

</div>

    <div class="lottery-preview">

        <img src="../../images/lottery_preview.png"
             alt="복권 명령어">

        <p class="preview-caption">

            실제 미닝봇 복권 명령어 화면입니다.

        </p>

    </div>

</section>

<section class="intro">

    <h2><i class="fa-solid fa-lightbulb"></i></h2>

    <p>

        양과 늑대 중 하나를 신중하게 선택해 보세요!

    </p>

    <p>

        어떤 선택을 하든 성공 확률은 동일합니다.
        당신의 직감을 믿어보세요. 🍀

    </p>

</section>

</main>

</body>

</html>
