<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>탐험</title>

    <link rel="stylesheet" href="../../style.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<!-- 카페와 동일하게 main 바깥에 배치 -->
<header class="page-header">

    <a href="../../index.html"
       class="home-btn"
       aria-label="홈으로 이동">

        <i class="fa-solid fa-house"></i>

    </a>

    <h1>탐험</h1>

</header>

<!-- 소개 카드와 정보 카드는 모두 page-content 안에 배치 -->
<main class="page-content">

    <section class="intro">

        <h2>탐험이란?</h2>

        <p>
            <code>/탐험</code> 명령어를 통해 희귀한 아이템을 찾아보세요!
        </p>

        <p>
            탐험에서는 돈을 획득할 수 없지만,
            아주 낮은 확률로 귀중한 아이템을 발견할 수 있습니다.
            한 번의 탐험이 예상치 못한 행운으로 이어질지도 모릅니다. 🍀
        </p>

        <ul>
            <li> 하루 100회 이용 가능</li>
            <li> 쿨타임 5초</li>
            <li>⭐ 탐험은 레벨이 존재하지 않습니다.</li>
        </ul>

    </section>

    <section class="level-card explore-card">

        <div class="explore-title">
            🍀 탐험 정보
        </div>

        <div class="explore-info-grid">

            <div class="farm-stat">
                <span>성공 확률</span>
                <strong>0.15%</strong>
            </div>

            <div class="farm-stat">
                <span>실패 확률</span>
                <strong>99.85%</strong>
            </div>

        </div>

        <div class="drop-title">

    <i class="fa-solid fa-gift"></i>
    획득 가능한 아이템

</div>
        <div class="explore-drop-list">

            <div class="drop-row">

                <div class="drop-left">

                    <img
                        src="../../images/repair_stone.png"
                        class="item-icon"
                        alt="수리석"
                    >

                    <span>수리석</span>

                </div>

                <div class="drop-right">
                    0.20%
                </div>

            </div>

            <div class="drop-row">

                <div class="drop-left">

                    <img
                        src="../../images/ginseng_piece.png"
                        class="item-icon"
                        alt="산삼조각"
                    >

                    <span>산삼조각</span>

                </div>

                <div class="drop-right">
                    0.05%
                </div>

            </div>

        </div>

    </section>

</main>

</body>
</html>
